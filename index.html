<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0e;
            --card-bg: #14141c;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #f59e0b; /* Dorado de alta fidelidad */
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            max-width: 500px; /* Optimización estricta para pantallas móviles */
            margin: 0 auto;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 35px 0 15px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--accent);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Barra de navegación de categorías deslizante */
        .categories-nav {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 5px 25px;
            scrollbar-width: none; /* Oculta scroll en Firefox */
        }
        
        .categories-nav::-webkit-scrollbar { 
            display: none; /* Oculta scroll en Chrome/Safari */
        }

        .category-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 400;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-btn.active {
            background: var(--accent);
            color: #000000;
            font-weight: 600;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        /* Contenedor de la lista de platos */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 22px;
            padding-bottom: 40px;
        }

        /* Tarjeta de cada plato */
        .menu-item {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s ease;
        }

        /* Imagen del plato con enfoque visual dominante */
        .item-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background-color: #1e1e24;
            display: block;
        }

        .item-info {
            padding: 22px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 8px;
        }

        .item-title {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .item-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
        }

        .item-description {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Estado de carga */
        .loader {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="rest-title">MENÚ DIGITAL</h1>
        <p>Precios Actualizados</p>
    </header>

    <nav class="categories-nav" id="categories-nav"></nav>

    <div class="loader" id="loader">Consultando nuestra cocina...</div>
    
    <div class="menu-container" id="menu-container"></div>

    <script>
        // Endpoint conectado directamente a tu Google Sheets
        const API_URL = 'https://script.google.com/macros/s/AKfycbz8XBI_surAkTyRS_RxYUU75S0MNN-Fz0KLWeAVZG38mTKd7mIUn5OI580x8g3-14ch/exec';
        let menuData = [];

        async function fetchMenu() {
            try {
                const response = await fetch(API_URL);
                menuData = await response.json();
                
                // Ocultar el estado de carga
                document.getElementById('loader').style.display = 'none';
                
                // Filtrar de forma estricta solo los productos marcados como "Sí" o "si" en disponibilidad
                menuData = menuData.filter(item => {
                    const disp = String(item['Disponible']).toLowerCase().trim();
                    return disp === 'sí' || disp === 'si';
                });
                
                renderCategories();
                renderMenu('todos');
            } catch (error) {
                console.error('Error cargando el menú:', error);
                document.getElementById('loader').innerText = 'Hubo un inconveniente al cargar el menú. Por favor, refresca la página.';
            }
        }

        function renderCategories() {
            const nav = document.getElementById('categories-nav');
            // Obtener categorías únicas presentes en la hoja de cálculo
            const uniqueCategories = [...new Set(menuData.map(item => item['Categoría'].trim()))];
            const allCategories = ['todos', ...uniqueCategories];
            
            nav.innerHTML = allCategories.map((cat, index) => `
                <button class="category-btn ${index === 0 ? 'active' : ''}" onclick="filterCategory('${cat}', this)">
                    ${cat.charAt(0).toUpperCase() + cat.slice(1)}
                </button>
            `).join('');
        }

        function filterCategory(category, button) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            renderMenu(category);
        }

        function renderMenu(categoryFilter) {
            const container = document.getElementById('menu-container');
            const filtered = categoryFilter === 'todos' 
                ? menuData 
                : menuData.filter(item => item['Categoría'].trim() === categoryFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="loader">No hay platos disponibles en esta sección.</div>';
                return;
            }

            container.innerHTML = filtered.map(item => {
                // Formatear precio de forma nativa a la estructura de moneda local
                const priceFormatted = new Intl.NumberFormat('es-CO', { 
                    style: 'currency', 
                    currency: 'COP', 
                    maximumFractionDigits: 0 
                }).format(item['Precio']);
                
                // Renderizar etiqueta de imagen solo si la celda tiene una URL válida
                const imageHtml = item['URL Imagen'] && item['URL Imagen'].startsWith('http')
                    ? `<img src="${item['URL Imagen']}" class="item-image" alt="${item['Nombre del Plato']}" loading="lazy">`
                    : '';
                
                return `
                    <div class="menu-item">
                        ${imageHtml}
                        <div class="item-info">
                            <div class="item-header">
                                <h3 class="item-title">${item['Nombre del Plato']}</h3>
                                <span class="item-price">${priceFormatted}</span>
                            </div>
                            <p class="item-description">${item['Descripción'] || ''}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Ejecución inmediata de la consulta dinámica
        fetchMenu();
    </script>
</body>
</html>
