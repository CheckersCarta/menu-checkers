<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
 <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0e;
            --card-bg: rgba(20, 20, 28, 0.7);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #F15A24; /* Tomé el naranja vibrante de tu código */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* 1. Elementos Decorativos de Fondo (Inspirado en tus Blobs) */
        .ambient-light {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }
        .light-top { top: -100px; left: -100px; }
        .light-bottom { bottom: -100px; right: -100px; }

        header { text-align: center; padding: 40px 0 20px; }

        /* 2. Tipografía Dual */
        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--accent);
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 5px;
        }

        .categories-nav {
            display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px 25px; scrollbar-width: none;
        }
        .categories-nav::-webkit-scrollbar { display: none; }

        .category-btn {
            background: rgba(255,255,255,0.03);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--accent) 0%, #ff7b4d 100%);
            color: #000;
            font-weight: 600;
            border-color: transparent;
            box-shadow: 0 10px 20px -5px rgba(241,90,36,0.4);
        }

        .menu-container { display: flex; flex-direction: column; gap: 25px; padding-bottom: 50px; }

        /* 3. Tarjetas con Efecto Flotante y Neumorfismo Oscuro */
        .menu-item {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item:hover, .menu-item:active {
            transform: translateY(-6px);
            border-color: rgba(241,90,36,0.3);
            box-shadow: 0 15px 35px -10px rgba(241,90,36,0.2);
        }

        .item-image {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .item-info { padding: 25px; }

        .item-header {
            display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; margin-bottom: 10px;
        }

        .item-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            line-height: 1.2;
        }

        /* Botón de precio redondeado al estilo de tu código */
        .item-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
            background: var(--accent);
            padding: 6px 16px;
            border-radius: 20px;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(241,90,36,0.3);
        }

        .item-description { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; }
        .loader { text-align: center; padding: 40px 0; color: var(--accent); }
    </style></head>
<body>

    <header>
        <h1 id="rest-title">MENÚ DIGITAL</h1>
        <p>Precios Actualizados</p>
    </header>

    <nav class="categories-nav" id="categories-nav"></nav>

    <div class="loader" id="loader">Consultando nuestra cocina...</div>
    
    <div class="menu-container" id="menu-container"></div>

    <script>
        // Endpoint conectado directamente a tu Google Sheets
        const API_URL = 'https://script.google.com/macros/s/AKfycbz8XBI_surAkTyRS_RxYUU75S0MNN-Fz0KLWeAVZG38mTKd7mIUn5OI580x8g3-14ch/exec';
        let menuData = [];

        async function fetchMenu() {
            try {
                const response = await fetch(API_URL);
                menuData = await response.json();
                
                // Ocultar el estado de carga
                document.getElementById('loader').style.display = 'none';
                
                // Filtrar de forma estricta solo los productos marcados como "Sí" o "si" en disponibilidad
                menuData = menuData.filter(item => {
                    const disp = String(item['Disponible']).toLowerCase().trim();
                    return disp === 'sí' || disp === 'si';
                });
                
                renderCategories();
                renderMenu('todos');
            } catch (error) {
                console.error('Error cargando el menú:', error);
                document.getElementById('loader').innerText = 'Hubo un inconveniente al cargar el menú. Por favor, refresca la página.';
            }
        }

        function renderCategories() {
            const nav = document.getElementById('categories-nav');
            // Obtener categorías únicas presentes en la hoja de cálculo
            const uniqueCategories = [...new Set(menuData.map(item => item['Categoría'].trim()))];
            const allCategories = ['todos', ...uniqueCategories];
            
            nav.innerHTML = allCategories.map((cat, index) => `
                <button class="category-btn ${index === 0 ? 'active' : ''}" onclick="filterCategory('${cat}', this)">
                    ${cat.charAt(0).toUpperCase() + cat.slice(1)}
                </button>
            `).join('');
        }

        function filterCategory(category, button) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            renderMenu(category);
        }

        function renderMenu(categoryFilter) {
            const container = document.getElementById('menu-container');
            const filtered = categoryFilter === 'todos' 
                ? menuData 
                : menuData.filter(item => item['Categoría'].trim() === categoryFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="loader">No hay platos disponibles en esta sección.</div>';
                return;
            }

            container.innerHTML = filtered.map(item => {
                // Formatear precio de forma nativa a la estructura de moneda local
                const priceFormatted = new Intl.NumberFormat('es-CO', { 
                    style: 'currency', 
                    currency: 'COP', 
                    maximumFractionDigits: 0 
                }).format(item['Precio']);
                
                // Renderizar etiqueta de imagen solo si la celda tiene una URL válida
                const imageHtml = item['URL Imagen'] && item['URL Imagen'].startsWith('http')
                    ? `<img src="${item['URL Imagen']}" class="item-image" alt="${item['Nombre del Plato']}" loading="lazy">`
                    : '';
                
                return `
                    <div class="menu-item">
                        ${imageHtml}
                        <div class="item-info">
                            <div class="item-header">
                                <h3 class="item-title">${item['Nombre del Plato']}</h3>
                                <span class="item-price">${priceFormatted}</span>
                            </div>
                            <p class="item-description">${item['Descripción'] || ''}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Ejecución inmediata de la consulta dinámica
        fetchMenu();
    </script>
</body>
</html>
