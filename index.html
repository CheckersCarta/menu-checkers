<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Menú Digital | Checkers</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@600;700&family=Montserrat:wght@800;900&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #F15A24;
            --secondary: #4D3626;
            --tertiary: #FFC244;
            --neutral: #F9F5F0;
            --card-bg: #FFFFFF;
            
            --font-headline: 'Montserrat', sans-serif;
            --font-body: 'Work Sans', sans-serif;
            --font-label: 'Be Vietnam Pro', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--neutral);
            color: var(--secondary);
            font-family: var(--font-body);
            padding: 15px;
            max-width: 550px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .ambient-light {
            position: fixed;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }
        .light-top { top: -150px; left: -150px; background: var(--primary); }
        .light-bottom { bottom: -100px; right: -150px; background: var(--tertiary); }

        header {
            text-align: center;
            padding: 30px 0 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilos del Logo */
        .brand-logo {
            max-width: 180px; /* Tamaño máximo del logo, puedes ajustarlo */
            width: auto;
            height: auto;
            margin-bottom: 15px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 6px rgba(77, 54, 38, 0.1));
        }

        header h1 {
            font-family: var(--font-headline);
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: var(--secondary);
            line-height: 1.1;
        }

        header p {
            font-family: var(--font-label);
            color: var(--primary);
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 5px;
        }

        .dropdown-container {
            position: relative;
            margin: 15px auto 30px auto;
            width: 90%;
            max-width: 350px;
        }

        #category-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 100%;
            background-color: var(--primary);
            color: #FFFFFF;
            font-family: var(--font-label);
            font-size: 1.05rem;
            font-weight: 700;
            padding: 14px 45px 14px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(241, 90, 36, 0.3);
            text-align: center;
            outline: none;
        }

        #category-select:focus {
            box-shadow: 0 8px 20px rgba(241, 90, 36, 0.4);
        }

        #category-select option {
            background-color: var(--card-bg);
            color: var(--secondary);
            font-weight: 600;
        }

        .dropdown-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #FFFFFF;
            pointer-events: none;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding-bottom: 50px;
        }

        .menu-item {
            background: var(--card-bg);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(77, 54, 38, 0.06);
            border: 1px solid rgba(241, 90, 36, 0.05);
        }

        .item-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-bottom: 4px solid var(--tertiary);
        }

        .item-info { padding: 25px; }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 12px;
        }

        .item-title {
            font-family: var(--font-headline);
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--secondary);
            line-height: 1.2;
        }

        .item-price {
            font-family: var(--font-label);
            font-size: 1.15rem;
            font-weight: 700;
            color: #FFFFFF;
            background: var(--primary);
            padding: 8px 18px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .item-description {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: rgba(77, 54, 38, 0.7);
            line-height: 1.6;
        }

        .loader {
            text-align: center;
            padding: 40px 0;
            color: var(--primary);
            font-family: var(--font-label);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="ambient-light light-top"></div>
    <div class="ambient-light light-bottom"></div>

    <header>
        <!-- AQUI DEBES PEGAR EL ENLACE DE TU LOGO (Reemplaza la URL de abajo) -->
        <img src="https://i.postimg.cc/MTqyZtkx/Logo2.png" class="brand-logo">
        
        <h1 id="rest-title">MENÚ</h1>
        <p>Selección del Día</p>
    </header>

    <div class="dropdown-container">
        <select id="category-select" onchange="filterCategory(this.value)"></select>
        <svg class="dropdown-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
    </div>

    <div class="loader" id="loader">Conectando con la cocina...</div>
    
    <div class="menu-container" id="menu-container"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz8XBI_surAkTyRS_RxYUU75S0MNN-Fz0KLWeAVZG38mTKd7mIUn5OI580x8g3-14ch/exec';
        let menuData = [];

        async function fetchMenu() {
            try {
                const response = await fetch(API_URL);
                menuData = await response.json();
                
                document.getElementById('loader').style.display = 'none';
                
                menuData = menuData.filter(item => {
                    const disp = String(item['Disponible']).toLowerCase().trim();
                    return disp === 'sí' || disp === 'si';
                });
                
                renderDropdown();
                renderMenu('todos');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loader').innerText = 'Error al cargar el menú. Por favor, refresca.';
            }
        }

        function renderDropdown() {
            const select = document.getElementById('category-select');
            const uniqueCategories = [...new Set(menuData.map(item => item['Categoría'].trim()))];
            
            let optionsHtml = `<option value="todos">Ver Todo el Menú</option>`;
            
            uniqueCategories.forEach(cat => {
                const displayCat = cat.charAt(0).toUpperCase() + cat.slice(1);
                optionsHtml += `<option value="${cat}">${displayCat}</option>`;
            });
            
            select.innerHTML = optionsHtml;
        }

        function filterCategory(categoryValue) {
            renderMenu(categoryValue);
        }

        function renderMenu(categoryFilter) {
            const container = document.getElementById('menu-container');
            const filtered = categoryFilter === 'todos' 
                ? menuData 
                : menuData.filter(item => item['Categoría'].trim() === categoryFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="loader">No hay platos en esta sección.</div>';
                return;
            }

            container.innerHTML = filtered.map(item => {
                const rawPrice = item['Precio'] || 0;
                const priceFormatted = new Intl.NumberFormat('es-CO', { 
                    style: 'currency', 
                    currency: 'COP', 
                    maximumFractionDigits: 0 
                }).format(rawPrice);
                
                const imageHtml = item['URL Imagen'] && item['URL Imagen'].startsWith('http')
                    ? `<img src="${item['URL Imagen']}" class="item-image" alt="${item['Nombre del Plato']}" loading="lazy">`
                    : '';
                
                return `
                    <div class="menu-item">
                        ${imageHtml}
                        <div class="item-info">
                            <div class="item-header">
                                <h3 class="item-title">${item['Nombre del Plato']}</h3>
                                <span class="item-price">${priceFormatted}</span>
                            </div>
                            <p class="item-description">${item['Descripción'] || ''}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        fetchMenu();
    </script>
</body>
</html>
