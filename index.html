<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@600;700&family=Montserrat:wght@800;900&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Paleta de Colores Extraída del Design System */
        :root {
            --primary: #F15A24;
            --secondary: #4D3626;
            --tertiary: #FFC244;
            --neutral: #F9F5F0;
            --card-bg: #FFFFFF;
            
            /* Tipografías */
            --font-headline: 'Montserrat', sans-serif;
            --font-body: 'Work Sans', sans-serif;
            --font-label: 'Be Vietnam Pro', sans-serif;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background-color: var(--neutral);
            color: var(--secondary);
            font-family: var(--font-body);
            padding: 15px;
            max-width: 550px; /* Ancho óptimo para lectura móvil */
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Elementos Decorativos de Fondo (Blobs) */
        .ambient-light {
            position: fixed;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }
        .light-top { 
            top: -150px; 
            left: -150px; 
            background: var(--primary); 
        }
        .light-bottom { 
            bottom: -100px; 
            right: -150px; 
            background: var(--tertiary); 
        }

        header {
            text-align: center;
            padding: 40px 0 25px;
        }

        header h1 {
            font-family: var(--font-headline);
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: var(--secondary);
            line-height: 1.1;
        }

        header p {
            font-family: var(--font-label);
            color: var(--primary);
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 8px;
        }

        /* Barra de navegación dinámica */
        .categories-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 5px 30px;
            scrollbar-width: none;
        }
        .categories-nav::-webkit-scrollbar { display: none; }

        .category-btn {
            font-family: var(--font-label);
            background: var(--card-bg);
            color: var(--secondary);
            border: 2px solid transparent;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(77, 54, 38, 0.05);
        }

        .category-btn.active {
            background: var(--primary);
            color: #FFFFFF;
            box-shadow: 0 8px 20px rgba(241, 90, 36, 0.3);
        }

        /* Contenedor de Tarjetas */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding-bottom: 50px;
        }

        /* Diseño de la Tarjeta del Plato */
        .menu-item {
            background: var(--card-bg);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(77, 54, 38, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(241, 90, 36, 0.05);
        }

        .menu-item:hover, .menu-item:active {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(241, 90, 36, 0.15);
            border-color: rgba(241, 90, 36, 0.2);
        }

        .item-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-bottom: 4px solid var(--tertiary);
        }

        .item-info {
            padding: 25px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 12px;
        }

        .item-title {
            font-family: var(--font-headline);
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--secondary);
            line-height: 1.2;
        }

        /* Etiqueta de Precio Destacada */
        .item-price {
            font-family: var(--font-label);
            font-size: 1.15rem;
            font-weight: 700;
            color: #FFFFFF;
            background: var(--primary);
            padding: 8px 18px;
            border-radius: 20px;
            white-space: nowrap;
            box-shadow: 0 6px 15px rgba(241, 90, 36, 0.25);
        }

        .item-description {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: rgba(77, 54, 38, 0.7); /* Secundario con opacidad */
            line-height: 1.6;
            font-weight: 400;
        }

        .loader {
            text-align: center;
            padding: 40px 0;
            color: var(--primary);
            font-family: var(--font-label);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="ambient-light light-top"></div>
    <div class="ambient-light light-bottom"></div>

    <header>
        <h1 id="rest-title">EL MENÚ</h1>
        <p>Selección del Día</p>
    </header>

    <nav class="categories-nav" id="categories-nav"></nav>

    <div class="loader" id="loader">Preparando la cocina...</div>
    
    <div class="menu-container" id="menu-container"></div>

    <script>
        // Endpoint conectado a tu App Script
        const API_URL = 'https://script.google.com/macros/s/AKfycbz8XBI_surAkTyRS_RxYUU75S0MNN-Fz0KLWeAVZG38mTKd7mIUn5OI580x8g3-14ch/exec';
        let menuData = [];

        async function fetchMenu() {
            try {
                const response = await fetch(API_URL);
                menuData = await response.json();
                
                document.getElementById('loader').style.display = 'none';
                
                // Filtrar disponibles
                menuData = menuData.filter(item => {
                    const disp = String(item['Disponible']).toLowerCase().trim();
                    return disp === 'sí' || disp === 'si';
                });
                
                renderCategories();
                renderMenu('todos');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loader').innerText = 'Error al cargar el menú. Por favor, refresca.';
            }
        }

        function renderCategories() {
            const nav = document.getElementById('categories-nav');
            const uniqueCategories = [...new Set(menuData.map(item => item['Categoría'].trim()))];
            const allCategories = ['todos', ...uniqueCategories];
            
            nav.innerHTML = allCategories.map((cat, index) => `
                <button class="category-btn ${index === 0 ? 'active' : ''}" onclick="filterCategory('${cat}', this)">
                    ${cat.charAt(0).toUpperCase() + cat.slice(1)}
                </button>
            `).join('');
        }

        function filterCategory(category, button) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            renderMenu(category);
        }

        function renderMenu(categoryFilter) {
            const container = document.getElementById('menu-container');
            const filtered = categoryFilter === 'todos' 
                ? menuData 
                : menuData.filter(item => item['Categoría'].trim() === categoryFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="loader">No hay platos en esta sección.</div>';
                return;
            }

            container.innerHTML = filtered.map(item => {
                const priceFormatted = new Intl.NumberFormat('es-CO', { 
                    style: 'currency', 
                    currency: 'COP', 
                    maximumFractionDigits: 0 
                }).format(item['Precio']);
                
                const imageHtml = item['URL Imagen'] && item['URL Imagen'].startsWith('http')
                    ? `<img src="${item['URL Imagen']}" class="item-image" alt="${item['Nombre del Plato']}" loading="lazy">`
                    : '';
                
                return `
                    <div class="menu-item">
                        ${imageHtml}
                        <div class="item-info">
                            <div class="item-header">
                                <h3 class="item-title">${item['Nombre del Plato']}</h3>
                                <span class="item-price">${priceFormatted}</span>
                            </div>
                            <p class="item-description">${item['Descripción'] || ''}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        fetchMenu();
    </script>
</body>
</html>
